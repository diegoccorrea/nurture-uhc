# Scoreboard configuration for Polaris UHC
# Each UHC state has its own scoreboard display
# Use MiniMessage formatting: <red>, <bold>, <gold>, etc.
# Placeholders: %players%, %alive%, %dead%, %spectators%, %state%, %time%, %next%, %border%, %kills%, %team%

# TODO - Change the name from polaris to nurture.

IDLE:
  title: "<aqua><b>Polaris UHC"
  lines:
    - "<gray><st>                       "
    - "<i>Players</i> <white>%players%"
    - "<i>TeamSize</i> <white>%teamsize%"
    - "<i>Host</i> <white>%host%"
    - ""
    - "<i>Scenarios</i> <aqua>/sᴄᴇɴ"
